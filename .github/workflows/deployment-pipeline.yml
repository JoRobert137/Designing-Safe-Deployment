name: Safe Deployment Pipeline

on:
  push:
    branches:
      - main
      - fix/**
  workflow_dispatch:

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log Source Information
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Run ID: $GITHUB_RUN_ID"

  build:
    needs: source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: .

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: project-files

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  security:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm audit --audit-level=high

      - name: Secret Scan
        run: echo "Secret scanning placeholder"

      - name: SAST Scan
        run: echo "SAST placeholder"

  deploy-staging:
    needs: security
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - run: echo "Deploying to staging..."

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: echo "Deploying to production..."

  verify:
    needs: deploy-production
    runs-on: ubuntu-latest

    steps:
      - name: Smoke Test
        run: echo "Smoke tests passed"

      - name: Health Check
        run: echo "Application healthy"

      - name: Rollback
        if: ${{ failure() }}
        run: echo "Rollback triggered"

  notify:
    if: ${{ failure() }}
    needs:
      - source
      - build
      - test
      - security
      - deploy-staging
      - deploy-production
      - verify

    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "Pipeline Failed"
          echo "Commit: $GITHUB_SHA"
          echo "Run ID: $GITHUB_RUN_ID"